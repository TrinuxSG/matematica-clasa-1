<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joc de Matematica</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Baloo 2', cursive;
            font-size: 2.5rem;
            color: white;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.2);
            margin-bottom: 10px;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .score-item {
            background: rgba(255,255,255,0.95);
            padding: 15px 25px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            text-align: center;
        }

        .score-label {
            font-size: 0.85rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-family: 'Baloo 2', cursive;
            font-size: 2rem;
            color: #764ba2;
        }

        .progress-bar {
            background: rgba(255,255,255,0.3);
            height: 12px;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00f260, #0575e6);
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .exercise-card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            text-align: center;
            margin-bottom: 20px;
            transform: scale(1);
            transition: transform 0.3s ease;
        }

        .exercise-card.correct {
            animation: celebrate 0.6s ease;
        }

        .exercise-card.wrong {
            animation: shake 0.5s ease;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        .exercise-number {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 15px;
        }

        .exercise-type {
            display: inline-block;
            font-size: 0.75rem;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .exercise-type.result {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .exercise-type.missing {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }

        .exercise-type.comparison {
            background: linear-gradient(135deg, #00b894, #00cec9);
        }

        .exercise-type.table-add {
            background: linear-gradient(135deg, #fdcb6e, #e17055);
        }

        .exercise-type.table-sub {
            background: linear-gradient(135deg, #74b9ff, #0984e3);
        }

        .exercise-type.chain {
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
        }

        .exercise-text {
            font-family: 'Baloo 2', cursive;
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .comparison-symbol {
            color: #764ba2;
            font-size: 2.8rem;
        }

        .answer-input {
            width: 100px;
            height: 70px;
            font-family: 'Baloo 2', cursive;
            font-size: 2.5rem;
            text-align: center;
            border: 4px solid #e0e0e0;
            border-radius: 15px;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .answer-input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 20px rgba(118, 75, 162, 0.3);
        }

        .answer-input.correct {
            border-color: #00c853;
            background: #e8f5e9;
        }

        .answer-input.wrong {
            border-color: #ff5252;
            background: #ffebee;
        }

        .inline-input {
            width: 70px;
            height: 55px;
            font-family: 'Baloo 2', cursive;
            font-size: 2.2rem;
            text-align: center;
            border: 4px dashed #764ba2;
            border-radius: 15px;
            outline: none;
            background: #f8f4ff;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .inline-input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 20px rgba(118, 75, 162, 0.3);
            border-style: solid;
        }

        .inline-input.correct {
            border-color: #00c853;
            border-style: solid;
            background: #e8f5e9;
        }

        .inline-input.wrong {
            border-color: #ff5252;
            border-style: solid;
            background: #ffebee;
        }

        /* Chain exercise styles */
        .chain-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 30px;
        }

        .chain-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            color: white;
            font-family: 'Baloo 2', cursive;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }

        .chain-operator {
            font-family: 'Baloo 2', cursive;
            font-size: 2rem;
            color: #e17055;
            padding: 0 5px;
            font-weight: bold;
        }

        .chain-equals {
            font-family: 'Baloo 2', cursive;
            font-size: 2.5rem;
            color: #333;
            padding: 0 10px;
        }

        .chain-input {
            width: 70px;
            height: 55px;
            font-family: 'Baloo 2', cursive;
            font-size: 2rem;
            text-align: center;
            border: 4px dashed #6c5ce7;
            border-radius: 15px;
            outline: none;
            background: #f0efff;
            transition: all 0.3s ease;
        }

        .chain-input:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.4);
            border-style: solid;
        }

        .chain-input.correct {
            border-color: #00c853;
            border-style: solid;
            background: #e8f5e9;
        }

        .chain-input.wrong {
            border-color: #ff5252;
            border-style: solid;
            background: #ffebee;
        }

        /* Table styles */
        .math-table {
            margin: 20px auto 30px;
            border-collapse: collapse;
            font-family: 'Baloo 2', cursive;
            font-size: 1.5rem;
        }

        .math-table th {
            padding: 12px 20px;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .math-table.addition th {
            background: linear-gradient(135deg, #fdcb6e, #e17055);
        }

        .math-table.subtraction th {
            background: linear-gradient(135deg, #74b9ff, #0984e3);
        }

        .math-table th:first-child {
            border-radius: 15px 0 0 0;
        }

        .math-table th:last-child {
            border-radius: 0 15px 0 0;
        }

        .math-table td {
            padding: 15px 20px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            text-align: center;
            font-size: 2rem;
            color: #333;
        }

        .math-table tr:last-child td:first-child {
            border-radius: 0 0 0 15px;
        }

        .math-table tr:last-child td:last-child {
            border-radius: 0 0 15px 0;
        }

        .math-table .table-input {
            width: 70px;
            height: 55px;
            font-family: 'Baloo 2', cursive;
            font-size: 2rem;
            text-align: center;
            border: 4px dashed #764ba2;
            border-radius: 12px;
            outline: none;
            background: #fff;
            transition: all 0.3s ease;
        }

        .math-table .table-input:focus {
            border-color: #764ba2;
            box-shadow: 0 0 15px rgba(118, 75, 162, 0.3);
            border-style: solid;
        }

        .math-table .table-input.correct {
            border-color: #00c853;
            border-style: solid;
            background: #e8f5e9;
        }

        .math-table .table-input.wrong {
            border-color: #ff5252;
            border-style: solid;
            background: #ffebee;
        }

        .btn {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #00c853, #00e676);
            color: white;
        }

        .btn-restart {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
        }

        .feedback {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: 600;
            min-height: 30px;
        }

        .feedback.correct {
            color: #00c853;
        }

        .feedback.wrong {
            color: #ff5252;
        }

        .hint-box {
            margin-top: 15px;
            padding: 15px 20px;
            background: #fff3e0;
            border-radius: 15px;
            border-left: 4px solid #ff9800;
            text-align: left;
            display: none;
        }

        .hint-box.visible {
            display: block;
        }

        .hint-box .hint-title {
            font-weight: 700;
            color: #e65100;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .hint-box .hint-text {
            color: #555;
            font-size: 1rem;
            line-height: 1.5;
        }

        .completion-screen {
            display: none;
            text-align: center;
        }

        .completion-screen.active {
            display: block;
        }

        .trophy {
            font-size: 6rem;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .final-score {
            font-family: 'Baloo 2', cursive;
            font-size: 3rem;
            color: white;
            margin-bottom: 10px;
        }

        .final-message {
            font-size: 1.3rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
        }

        .stars {
            font-size: 3rem;
            margin-bottom: 30px;
        }

        .game-container {
            display: block;
        }

        .game-container.hidden {
            display: none;
        }

        .confetti {
            position: fixed;
            width: 15px;
            height: 15px;
            top: -20px;
            animation: confetti-fall 3s linear forwards;
            pointer-events: none;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .task-hint {
            font-size: 0.85rem;
            color: #999;
            margin-top: 15px;
            font-style: italic;
        }

        @media (max-width: 500px) {
            .chain-circle {
                width: 45px;
                height: 45px;
                font-size: 1.5rem;
            }
            .chain-operator {
                font-size: 1.5rem;
            }
            .chain-input {
                width: 55px;
                height: 45px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧮 Joc de Matematica</h1>
        </header>

        <div class="score-board">
            <div class="score-item">
                <div class="score-label">Rezolvate</div>
                <div class="score-value" id="correct-count">0</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <div class="game-container" id="game-container">
            <div class="exercise-card" id="exercise-card">
                <div class="exercise-number" id="exercise-number">Exercitiul 1 din 125</div>
                <div class="exercise-type" id="exercise-type">Gaseste rezultatul</div>
                <div class="exercise-content" id="exercise-content"></div>
                <button class="btn btn-primary" id="check-btn" onclick="checkAnswer()">Verifica</button>
                <div class="feedback" id="feedback"></div>
                <div class="hint-box" id="hint-box">
                    <div class="hint-title">💡 Indiciu:</div>
                    <div class="hint-text" id="hint-text"></div>
                </div>
                <div class="task-hint" id="task-hint"></div>
            </div>
        </div>

        <div class="completion-screen" id="completion-screen">
            <div class="trophy">🏆</div>
            <div class="final-score" id="final-score">0 / 125</div>
            <div class="stars" id="stars"></div>
            <div class="final-message" id="final-message">Felicitari!</div>
            <button class="btn btn-restart" onclick="restartGame()">Joaca din nou</button>
        </div>
    </div>

        let currentIndex = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        shuffleArray(exercises);

        function loadExercise() {

                        chainHtml += `<span class="chain-operator">${exercise.operators[i]}</span>`;
                    }
                }

                chainHtml += '</div>';

        function getComparisonHint(symbol) {
            if (symbol === "=") return "Gaseste numerele astfel incat cele doua parti sa fie egale";
            if (symbol === ">") return "Partea stanga trebuie sa fie mai mare decat partea dreapta";
            if (symbol === "<") return "Partea stanga trebuie sa fie mai mica decat partea dreapta";
            return "";
        }

        function generateHint(exercise, userAnswer, userLeftAnswer, userRightAnswer) {
            if (exercise.type === "result") {
                const correctAnswer = exercise.answer;
                if (userAnswer > correctAnswer) {
                    return `Raspunsul tau (${userAnswer}) este prea mare. Incearca un numar mai mic!`;
                } else {
                    return `Raspunsul tau (${userAnswer}) este prea mic. Incearca un numar mai mare!`;
                }
            } else if (exercise.type === "missing") {
                const correctAnswer = exercise.answer;
                if (userAnswer > correctAnswer) {
                    return `Numarul tau (${userAnswer}) este prea mare. Gandeste-te: ce numar trebuie sa pui ca sa obtii rezultatul corect?`;
                } else {
                    return `Numarul tau (${userAnswer}) este prea mic. Gandeste-te: ce numar trebuie sa pui ca sa obtii rezultatul corect?`;
                }
            } else if (exercise.type === "comparison") {
                const leftSide = evaluateExpression(exercise.leftParts, userLeftAnswer);
                const rightSide = evaluateExpression(exercise.rightParts, userRightAnswer);
                
                if (exercise.symbol === "=") {
                    if (leftSide > rightSide) {
                        return `Partea stanga (${leftSide}) este mai mare decat partea dreapta (${rightSide}). Trebuie sa fie egale!`;
                    } else {
                        return `Partea stanga (${leftSide}) este mai mica decat partea dreapta (${rightSide}). Trebuie sa fie egale!`;
                    }
                } else if (exercise.symbol === ">") {
                    return `Partea stanga (${leftSide}) trebuie sa fie MAI MARE decat partea dreapta (${rightSide}). Acum nu este asa.`;
                } else if (exercise.symbol === "<") {
                    return `Partea stanga (${leftSide}) trebuie sa fie MAI MICA decat partea dreapta (${rightSide}). Acum nu este asa.`;
                }
            } else if (exercise.type === "table-add") {
                let correctAnswer;
                if (exercise.unknown === "termen1") {
                    correctAnswer = exercise.termen1;
                    if (userAnswer > correctAnswer) {
                        return `Numarul tau (${userAnswer}) este prea mare. Gandeste-te: ? + ${exercise.termen2} = ${exercise.suma}`;
                    } else {
                        return `Numarul tau (${userAnswer}) este prea mic. Gandeste-te: ? + ${exercise.termen2} = ${exercise.suma}`;
                    }
                } else if (exercise.unknown === "termen2") {
                    correctAnswer = exercise.termen2;
                    if (userAnswer > correctAnswer) {
                        return `Numarul tau (${userAnswer}) este prea mare. Gandeste-te: ${exercise.termen1} + ? = ${exercise.suma}`;
                    } else {
                        return `Numarul tau (${userAnswer}) este prea mic. Gandeste-te: ${exercise.termen1} + ? = ${exercise.suma}`;
                    }
                } else {
                    correctAnswer = exercise.suma;
                    if (userAnswer > correctAnswer) {
                        return `Suma ta (${userAnswer}) este prea mare. Cat face ${exercise.termen1} + ${exercise.termen2}?`;
                    } else {
                        return `Suma ta (${userAnswer}) este prea mica. Cat face ${exercise.termen1} + ${exercise.termen2}?`;
                    }
                }
            } else if (exercise.type === "table-sub") {
                let correctAnswer;
                if (exercise.unknown === "descazut") {
                    correctAnswer = exercise.descazut;
                    if (userAnswer > correctAnswer) {
                        return `Numarul tau (${userAnswer}) este prea mare. Gandeste-te: ? - ${exercise.scazator} = ${exercise.diferenta}`;
                    } else {
                        return `Numarul tau (${userAnswer}) este prea mic. Gandeste-te: ? - ${exercise.scazator} = ${exercise.diferenta}`;
                    }
                } else if (exercise.unknown === "scazator") {
                    correctAnswer = exercise.scazator;
                    if (userAnswer > correctAnswer) {
                        return `Numarul tau (${userAnswer}) este prea mare. Gandeste-te: ${exercise.descazut} - ? = ${exercise.diferenta}`;
                    } else {
                        return `Numarul tau (${userAnswer}) este prea mic. Gandeste-te: ${exercise.descazut} - ? = ${exercise.diferenta}`;
                    }
                } else {
                    correctAnswer = exercise.diferenta;
                    if (userAnswer > correctAnswer) {
                        return `Diferenta ta (${userAnswer}) este prea mare. Cat face ${exercise.descazut} - ${exercise.scazator}?`;
                    } else {
                        return `Diferenta ta (${userAnswer}) este prea mica. Cat face ${exercise.descazut} - ${exercise.scazator}?`;
                    }
                }
            } else if (exercise.type === "chain") {
                const correctAnswer = exercise.answer;
                // Build the expression string for hint
                let expr = exercise.numbers[0].toString();
                for (let i = 0; i < exercise.operators.length; i++) {
                    expr += ` ${exercise.operators[i]} ${exercise.numbers[i + 1]}`;
                }
                if (userAnswer > correctAnswer) {
                    return `Raspunsul tau (${userAnswer}) este prea mare. Calculeaza pas cu pas: ${expr}`;
                } else {
                    return `Raspunsul tau (${userAnswer}) este prea mic. Calculeaza pas cu pas: ${expr}`;
                }
            }
            return "Mai incearca!";
        }

        function getCorrectAnswer(exercise) {
            if (exercise.type === "result" || exercise.type === "missing" || exercise.type === "chain") {
                return exercise.answer;
            } else if (exercise.type === "table-add") {
                if (exercise.unknown === "termen1") return exercise.termen1;
                if (exercise.unknown === "termen2") return exercise.termen2;
                return exercise.suma;
            } else if (exercise.type === "table-sub") {
                if (exercise.unknown === "descazut") return exercise.descazut;
                if (exercise.unknown === "scazator") return exercise.scazator;
                return exercise.diferenta;
            }
            return null;
        }

        function checkAnswer() {
            const exercise = exercises[currentIndex];
            const feedback = document.getElementById('feedback');
            const card = document.getElementById('exercise-card');
            const btn = document.getElementById('check-btn');
            const hintBox = document.getElementById('hint-box');
            const hintText = document.getElementById('hint-text');

            if (answered) {
                currentIndex++;
                if (currentIndex < exercises.length) {
                    loadExercise();
                } else {
                    showCompletion();
                }
                return;
            }

            if (exercise.type === "result" || exercise.type === "missing" || exercise.type === "table-add" || exercise.type === "table-sub" || exercise.type === "chain") {
                const input = document.getElementById('answer-input');
                const userAnswer = parseInt(input.value);
                const correctAnswer = getCorrectAnswer(exercise);

                if (isNaN(userAnswer)) {
                    feedback.textContent = 'Introdu un numar!';
                    feedback.className = 'feedback wrong';
                    return;
                }

                if (userAnswer < 0) {
                    feedback.textContent = 'Numarul trebuie sa fie cel putin 0!';
                    feedback.className = 'feedback wrong';
                    return;
                }

                if (userAnswer === correctAnswer) {
                    answered = true;
                    correctCount++;
                    document.getElementById('correct-count').textContent = correctCount;
                    
                    if (input.classList.contains('table-input')) {
                        input.classList.add('correct');
                    } else if (input.classList.contains('chain-input')) {
                        input.classList.add('correct');
                    } else if (input.classList.contains('inline-input')) {
                        input.className = 'inline-input correct';
                    } else {
                        input.className = 'answer-input correct';
                    }
                    card.className = 'exercise-card correct';
                    feedback.textContent = '✓ Corect! Bravo!';
                    feedback.className = 'feedback correct';
                    hintBox.className = 'hint-box';

                    if (currentIndex < exercises.length - 1) {
                        btn.textContent = 'Urmatorul →';
                    } else {
                        btn.textContent = 'Vezi rezultatul';
                    }
                } else {
                    if (input.classList.contains('table-input')) {
                        input.classList.add('wrong');
                    } else if (input.classList.contains('chain-input')) {
                        input.classList.add('wrong');
                    } else if (input.classList.contains('inline-input')) {
                        input.className = 'inline-input wrong';
                    } else {
                        input.className = 'answer-input wrong';
                    }
                    card.className = 'exercise-card wrong';
                    feedback.textContent = '✗ Mai incearca!';
                    feedback.className = 'feedback wrong';
                    
                    hintText.textContent = generateHint(exercise, userAnswer);
                    hintBox.className = 'hint-box visible';
                    
                    setTimeout(() => {
                        if (input.classList.contains('table-input')) {
                            input.classList.remove('wrong');
                        } else if (input.classList.contains('chain-input')) {
                            input.classList.remove('wrong');
                        } else if (input.classList.contains('inline-input') || input.className.includes('inline-input')) {
                            input.className = 'inline-input';
                        } else {
                            input.className = 'answer-input';
                        }
                        card.className = 'exercise-card';
                        input.value = '';
                        input.focus();
                    }, 1500);
                }

            } else if (exercise.type === "comparison") {
                const leftInput = document.getElementById('answer-left');
                const rightInput = document.getElementById('answer-right');
                const leftAnswer = parseInt(leftInput.value);
                const rightAnswer = parseInt(rightInput.value);

                if (isNaN(leftAnswer) || isNaN(rightAnswer)) {
                    feedback.textContent = 'Completeaza ambele campuri!';
                    feedback.className = 'feedback wrong';
                    return;
                }

                if (leftAnswer < 0 || rightAnswer < 0) {
                    feedback.textContent = 'Numerele trebuie sa fie cel putin 0!';
                    feedback.className = 'feedback wrong';
                    return;
                }

                const leftSide = evaluateExpression(exercise.leftParts, leftAnswer);
                const rightSide = evaluateExpression(exercise.rightParts, rightAnswer);

                let isCorrect = false;
                if (exercise.symbol === "=" && leftSide === rightSide) isCorrect = true;
                if (exercise.symbol === ">" && leftSide > rightSide) isCorrect = true;
                if (exercise.symbol === "<" && leftSide < rightSide) isCorrect = true;

                if (isCorrect) {
                    answered = true;
                    correctCount++;
                    document.getElementById('correct-count').textContent = correctCount;
                    leftInput.className = 'inline-input correct';
                    rightInput.className = 'inline-input correct';
                    card.className = 'exercise-card correct';
                    feedback.textContent = '✓ Corect! Bravo!';
                    feedback.className = 'feedback correct';
                    hintBox.className = 'hint-box';

                    if (currentIndex < exercises.length - 1) {
                        btn.textContent = 'Urmatorul →';
                    } else {
                        btn.textContent = 'Vezi rezultatul';
                    }
                } else {
                    leftInput.className = 'inline-input wrong';
                    rightInput.className = 'inline-input wrong';
                    card.className = 'exercise-card wrong';
                    feedback.textContent = '✗ Mai incearca!';
                    feedback.className = 'feedback wrong';
                    
                    hintText.textContent = generateHint(exercise, null, leftAnswer, rightAnswer);
                    hintBox.className = 'hint-box visible';
                    
                    setTimeout(() => {
                        leftInput.className = 'inline-input';
                        rightInput.className = 'inline-input';
                        card.className = 'exercise-card';
                        leftInput.value = '';
                        rightInput.value = '';
                        leftInput.focus();
                    }, 1500);
                }
            }
        }

        function evaluateExpression(parts, answer) {
            const fullExpr = parts[0] + answer + parts[1];
            const match = fullExpr.match(/(\d+)\s*([+\-])\s*(\d+)/);
            if (match) {
                const a = parseInt(match[1]);
                const op = match[2];
                const b = parseInt(match[3]);
                return op === '+' ? a + b : a - b;
            }
            return parseInt(fullExpr);
        }

        function showCompletion() {
            document.getElementById('game-container').className = 'game-container hidden';
            document.getElementById('completion-screen').className = 'completion-screen active';
            document.getElementById('final-score').textContent = `${correctCount} / ${exercises.length}`;
            document.getElementById('progress').style.width = '100%';

            const percentage = (correctCount / exercises.length) * 100;
            let stars = '';
            let message = '';

            if (percentage === 100) {
                stars = '⭐⭐⭐';
                message = 'Perfect! Esti un geniu al matematicii!';
            } else if (percentage >= 80) {
                stars = '⭐⭐';
                message = 'Excelent! Foarte bine!';
            } else if (percentage >= 60) {
                stars = '⭐';
                message = 'Bine! Mai exerseaza!';
            } else {
                stars = '';
                message = 'Continua sa exersezi! Poti mai mult!';
            }

            document.getElementById('stars').textContent = stars;
            document.getElementById('final-message').textContent = message;

            if (percentage >= 80) {
                createConfetti();
            }
        }

        function createConfetti() {
            const colors = ['#667eea', '#764ba2', '#f093fb', '#00c853', '#ffeb3b', '#ff5252'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 50);
            }
        }

        function restartGame() {
            currentIndex = 0;
            correctCount = 0;
            shuffleArray(exercises);
            document.getElementById('correct-count').textContent = '0';
            document.getElementById('game-container').className = 'game-container';
            document.getElementById('completion-screen').className = 'completion-screen';
            loadExercise();
        }

        loadExercise();
    </script>
</body>
</html>
