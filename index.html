<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jocuri educative pentru clasa 1 - matematică și limba română! Exersează adunarea, scăderea și vocabularul într-un mod distractiv!">
    <meta name="keywords" content="jocuri clasa 1, matematică, limba română, joc educativ, copii, adunare, scădere, exerciții">
    <meta name="author" content="Jocuri pentru clasa 1">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Jocuri pentru clasa 1 - Învață jucându-te!">
    <meta property="og:description" content="Jocuri educative pentru clasa 1 - matematică și limba română! Exersează adunarea, scăderea și vocabularul într-un mod distractiv!">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Jocuri pentru clasa 1 - Învață jucându-te!">
    <meta property="twitter:description" content="Jocuri educative pentru clasa 1 - matematică și limba română! Exersează adunarea, scăderea și vocabularul într-un mod distractiv!">

    <title>Jocuri pentru clasa 1 - Învață jucându-te!</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Jocuri pentru clasa 1</h1>
        </header>

        <div class="score-board">
            <div class="score-item score-correct">
                <div class="score-label">Corecte</div>
                <div class="score-value" id="correct-count">0</div>
            </div>
            <div class="score-item score-wrong">
                <div class="score-label">Greșite</div>
                <div class="score-value" id="wrong-count">0</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <!-- Menu Screen -->
        <div class="menu-screen" id="menu-screen">
            <div class="menu-card">
                <h2 class="menu-title">Alege tipul de exerciții</h2>
                <div class="menu-grid">
                    <button class="menu-btn math-btn" onclick="startGame('all-math')">
                        <div class="menu-icon">🔢</div>
                        <div class="menu-label">Toate Matematica</div>
                        <div class="menu-count">225 exerciții</div>
                    </button>
                    <button class="menu-btn romanian-btn" onclick="startGame('all-romanian')">
                        <div class="menu-icon">📖</div>
                        <div class="menu-label">Toate Română</div>
                        <div class="menu-count">60 exerciții</div>
                    </button>
                    <button class="menu-btn sequence-btn" onclick="startGame('sequence')">
                        <div class="menu-icon">🔢</div>
                        <div class="menu-label">Predecesor-Succesor</div>
                        <div class="menu-count">30 exerciții</div>
                    </button>
                    <button class="menu-btn addition-btn" onclick="startGame('addition')">
                        <div class="menu-icon">➕</div>
                        <div class="menu-label">Adunare</div>
                        <div class="menu-count">90 exerciții</div>
                    </button>
                    <button class="menu-btn subtraction-btn" onclick="startGame('subtraction')">
                        <div class="menu-icon">➖</div>
                        <div class="menu-label">Scădere</div>
                        <div class="menu-count">85 exerciții</div>
                    </button>
                    <button class="menu-btn column-btn" onclick="startGame('column')">
                        <div class="menu-icon">📊</div>
                        <div class="menu-label">Adunare/Scădere în Coloniță</div>
                        <div class="menu-count">50 exerciții</div>
                    </button>
                    <button class="menu-btn story-btn" onclick="startGame('story')">
                        <div class="menu-icon">📚</div>
                        <div class="menu-label">Probleme Text</div>
                        <div class="menu-count">25 exerciții</div>
                    </button>
                    <button class="menu-btn syllable-btn" onclick="startGame('syllable')">
                        <div class="menu-icon">✂️</div>
                        <div class="menu-label">Desparte pe Silabe</div>
                        <div class="menu-count">30 exerciții</div>
                    </button>
                    <button class="menu-btn word-btn" onclick="startGame('word')">
                        <div class="menu-icon">🔤</div>
                        <div class="menu-label">Ordonează Literele</div>
                        <div class="menu-count">30 exerciții</div>
                    </button>
                    <button class="menu-btn all-btn" onclick="startGame('all')">
                        <div class="menu-icon">🎯</div>
                        <div class="menu-label">Toate Exercițiile</div>
                        <div class="menu-count">285 exerciții</div>
                    </button>
                </div>
            </div>
        </div>

        <div class="game-container hidden" id="game-container">
            <div class="exercise-card" id="exercise-card">
                <div class="exercise-number" id="exercise-number">Exercitiul 1 din 125</div>
                <div class="exercise-type" id="exercise-type">Gaseste rezultatul</div>
                <div class="exercise-content" id="exercise-content"></div>
                <button class="btn btn-primary" id="check-btn" onclick="checkAnswer()">Verifica</button>
                <div class="feedback" id="feedback"></div>
                <div class="hint-box" id="hint-box">
                    <div class="hint-title">💡 Indiciu:</div>
                    <div class="hint-text" id="hint-text"></div>
                </div>
                <div class="task-hint" id="task-hint"></div>
            </div>
            <button class="btn btn-back" onclick="backToMenu()">← Înapoi la meniu</button>
        </div>

        <div class="completion-screen" id="completion-screen">
            <div class="trophy">🏆</div>
            <div class="final-score" id="final-score">0 / 125</div>
            <div class="stars" id="stars"></div>
            <div class="final-message" id="final-message">Felicitari!</div>
            <button class="btn btn-restart" onclick="restartGame()">Joaca din nou</button>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/script.js"></script>
</body>
</html>
